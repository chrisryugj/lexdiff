<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">System Architecture</text>

  <!-- Frontend Layer -->
  <g filter="url(#shadow)">
    <rect x="40" y="55" width="720" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="60" y="80" font-size="13" font-weight="600" fill="#475569">FRONTEND</text>
    <text x="720" y="80" text-anchor="end" font-size="12" fill="#94a3b8">Next.js 16 + React 19</text>

    <rect x="60" y="95" width="200" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="160" y="118" text-anchor="middle" font-size="14" fill="#334155">Law Viewer</text>

    <rect x="280" y="95" width="200" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="380" y="118" text-anchor="middle" font-size="14" fill="#334155">AI Search</text>

    <rect x="500" y="95" width="240" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="620" y="118" text-anchor="middle" font-size="14" fill="#334155">Precedent Search</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="400" y1="145" x2="400" y2="165" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="395,162 400,172 405,162" fill="#94a3b8"/>

  <!-- API Layer -->
  <g filter="url(#shadow)">
    <rect x="40" y="175" width="720" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="60" y="200" font-size="13" font-weight="600" fill="#475569">API LAYER</text>
    <text x="720" y="200" text-anchor="end" font-size="12" fill="#94a3b8">73 Endpoints</text>

    <rect x="60" y="215" width="200" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="160" y="238" text-anchor="middle" font-size="13" fill="#334155">/api/eflaw, law-search</text>

    <rect x="280" y="215" width="200" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="380" y="238" text-anchor="middle" font-size="13" fill="#334155">/api/file-search-rag</text>

    <rect x="500" y="215" width="240" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="620" y="238" text-anchor="middle" font-size="13" fill="#334155">/api/precedent-*</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="400" y1="265" x2="400" y2="285" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="395,282 400,292 405,282" fill="#94a3b8"/>

  <!-- External Services Layer -->
  <g filter="url(#shadow)">
    <rect x="40" y="295" width="720" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="60" y="320" font-size="13" font-weight="600" fill="#475569">EXTERNAL SERVICES</text>

    <rect x="60" y="335" width="340" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="230" y="358" text-anchor="middle" font-size="14" fill="#334155">법제처 Open API (law.go.kr)</text>

    <rect x="420" y="335" width="320" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="580" y="358" text-anchor="middle" font-size="14" fill="#334155">Google Gemini 2.5 Flash</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="400" y1="385" x2="400" y2="405" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="395,402 400,412 405,402" fill="#94a3b8"/>

  <!-- Storage Layer -->
  <g filter="url(#shadow)">
    <rect x="40" y="415" width="720" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="60" y="440" font-size="13" font-weight="600" fill="#475569">STORAGE</text>
    <text x="720" y="440" text-anchor="end" font-size="12" fill="#94a3b8">~25ms response</text>

    <rect x="60" y="455" width="210" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="165" y="478" text-anchor="middle" font-size="14" fill="#334155">IndexedDB (7일)</text>

    <rect x="290" y="455" width="210" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="395" y="478" text-anchor="middle" font-size="14" fill="#334155">HTTP Cache</text>

    <rect x="520" y="455" width="220" height="35" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="630" y="478" text-anchor="middle" font-size="14" fill="#334155">Turso / LibSQL</text>
  </g>
</svg>
