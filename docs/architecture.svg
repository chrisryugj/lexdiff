<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#fafafa"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f2937">LexDiff System Architecture</text>

  <!-- Frontend Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="60" width="800" height="100" rx="12" fill="url(#frontendGrad)"/>
    <text x="450" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Frontend (Next.js 16 + React 19)</text>

    <!-- Frontend boxes -->
    <rect x="70" y="100" width="230" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="185" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">🖥️ Law Viewer</text>
    <text x="185" y="135" text-anchor="middle" font-size="10" fill="#6b7280">3단 비교 뷰어</text>

    <rect x="320" y="100" width="230" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="435" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">🤖 AI Search</text>
    <text x="435" y="135" text-anchor="middle" font-size="10" fill="#6b7280">RAG + SSE Streaming</text>

    <rect x="570" y="100" width="260" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="700" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">⚖️ Precedent Search</text>
    <text x="700" y="135" text-anchor="middle" font-size="10" fill="#6b7280">판례 / 해석례 / 재결례</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 450 160 L 450 185" stroke="#9ca3af" stroke-width="2" marker-end="url(#arrowhead)"/>
  <polygon id="arrowhead" points="445,180 450,190 455,180" fill="#9ca3af"/>

  <!-- API Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="195" width="800" height="100" rx="12" fill="url(#apiGrad)"/>
    <text x="450" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="white">API Layer (73 Endpoints)</text>

    <!-- API boxes -->
    <rect x="70" y="235" width="230" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="185" y="253" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">/api/eflaw · /api/law-search</text>
    <text x="185" y="268" text-anchor="middle" font-size="10" fill="#6b7280">/api/three-tier · /api/ordinance-*</text>

    <rect x="320" y="235" width="230" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="435" y="253" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">/api/file-search-rag</text>
    <text x="435" y="268" text-anchor="middle" font-size="10" fill="#6b7280">/api/ai-*</text>

    <rect x="570" y="235" width="260" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="700" y="253" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">/api/precedent-* · /api/interpretation-*</text>
    <text x="700" y="268" text-anchor="middle" font-size="10" fill="#6b7280">/api/tax-tribunal-* · /api/customs-*</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 450 295 L 450 320" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="445,315 450,325 455,315" fill="#9ca3af"/>

  <!-- External Services Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="330" width="800" height="100" rx="12" fill="url(#externalGrad)"/>
    <text x="450" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="white">External Services</text>

    <!-- External boxes -->
    <rect x="70" y="370" width="350" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="245" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">🏛️ 법제처 Open API (law.go.kr)</text>
    <text x="245" y="403" text-anchor="middle" font-size="10" fill="#6b7280">법령 · 조례 · 판례 · 해석례 · 재결례</text>

    <rect x="440" y="370" width="390" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="635" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">✨ Google Gemini 2.5 Flash</text>
    <text x="635" y="403" text-anchor="middle" font-size="10" fill="#6b7280">File Search RAG · Vector Store · Context-based Answer</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 450 430 L 450 455" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="445,450 450,460 455,450" fill="#9ca3af"/>

  <!-- Storage Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="465" width="800" height="100" rx="12" fill="url(#storageGrad)"/>
    <text x="450" y="490" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Caching &amp; Storage</text>

    <!-- Storage boxes -->
    <rect x="70" y="505" width="230" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="185" y="523" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">💾 IndexedDB</text>
    <text x="185" y="538" text-anchor="middle" font-size="10" fill="#6b7280">법령 캐시 7일 · AI 결과 · ~25ms</text>

    <rect x="320" y="505" width="230" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="435" y="523" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">🌐 HTTP Cache</text>
    <text x="435" y="538" text-anchor="middle" font-size="10" fill="#6b7280">API 응답 1h · 정적 자원 24h</text>

    <rect x="570" y="505" width="260" height="45" rx="8" fill="white" fill-opacity="0.95"/>
    <text x="700" y="523" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">🗄️ Turso / LibSQL</text>
    <text x="700" y="538" text-anchor="middle" font-size="10" fill="#6b7280">AI 학습 데이터 · 사용자 피드백</text>
  </g>

  <!-- Stats badges -->
  <g>
    <rect x="50" y="580" width="100" height="25" rx="12" fill="#3b82f6"/>
    <text x="100" y="597" text-anchor="middle" font-size="11" font-weight="600" fill="white">73 APIs</text>

    <rect x="160" y="580" width="120" height="25" rx="12" fill="#10b981"/>
    <text x="220" y="597" text-anchor="middle" font-size="11" font-weight="600" fill="white">667 Tests</text>

    <rect x="290" y="580" width="100" height="25" rx="12" fill="#8b5cf6"/>
    <text x="340" y="597" text-anchor="middle" font-size="11" font-weight="600" fill="white">~25ms</text>
  </g>
</svg>
