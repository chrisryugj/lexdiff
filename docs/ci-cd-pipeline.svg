<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">CI/CD Pipeline</text>

  <!-- Pipeline steps -->
  <g filter="url(#shadow)">
    <rect x="30" y="55" width="130" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="95" y="80" text-anchor="middle" font-size="13" font-weight="500" fill="#334155">PR / Push</text>
    <text x="95" y="98" text-anchor="middle" font-size="11" fill="#64748b">Trigger</text>
  </g>

  <line x1="160" y1="82" x2="185" y2="82" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="182,77 192,82 182,87" fill="#94a3b8"/>

  <g filter="url(#shadow)">
    <rect x="195" y="55" width="130" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="260" y="80" text-anchor="middle" font-size="13" font-weight="500" fill="#334155">Lint</text>
    <text x="260" y="98" text-anchor="middle" font-size="11" fill="#64748b">ESLint</text>
  </g>

  <line x1="325" y1="82" x2="350" y2="82" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="347,77 357,82 347,87" fill="#94a3b8"/>

  <g filter="url(#shadow)">
    <rect x="360" y="55" width="130" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="425" y="80" text-anchor="middle" font-size="13" font-weight="500" fill="#334155">Type Check</text>
    <text x="425" y="98" text-anchor="middle" font-size="11" fill="#64748b">tsc</text>
  </g>

  <line x1="490" y1="82" x2="515" y2="82" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="512,77 522,82 512,87" fill="#94a3b8"/>

  <g filter="url(#shadow)">
    <rect x="525" y="55" width="130" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="590" y="80" text-anchor="middle" font-size="13" font-weight="500" fill="#334155">Build</text>
    <text x="590" y="98" text-anchor="middle" font-size="11" fill="#64748b">next build</text>
  </g>

  <line x1="655" y1="82" x2="680" y2="82" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="677,77 687,82 677,87" fill="#94a3b8"/>

  <g filter="url(#shadow)">
    <rect x="690" y="55" width="100" height="55" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="740" y="80" text-anchor="middle" font-size="13" font-weight="500" fill="#166534">Test</text>
    <text x="740" y="98" text-anchor="middle" font-size="11" fill="#16a34a">667 cases</text>
  </g>

  <!-- Status indicators -->
  <g transform="translate(30, 135)">
    <text x="0" y="12" font-size="11" fill="#64748b">GitHub Actions • 자동 실행 • PR/Push 트리거</text>
  </g>
</svg>
